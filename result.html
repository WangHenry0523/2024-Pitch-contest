<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      font-family: 'Times New Roman', Times, serif;
      background-color: #f8f9fa;
    }
    .container {
      background-color: #ffffff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    h1 {
      color: #007bff;
    }
    .btn-custom {
      color: white;
      background-color: #007bff;
      border: none;
    }
    .btn-custom:hover {
      color: black;
      background-color: #007bff;
    }
    .img-thumbnail {
      max-width: 400px;
    }
    .img-thumbnail-2 {
      max-width: 350px;
    }
    .alert {
      font-size: 1.2em;
      text-align: center;
    }
    .more-info {
      display: none;
      margin-top: 20px;
    }
  </style>
  <title>Detection Result</title>
  <script>
    function toggleMoreInfo() {
      var moreInfo = document.getElementById("more-info");
      if (moreInfo.style.display === "none") {
        moreInfo.style.display = "block";
      } else {
        moreInfo.style.display = "none";
      }
    }
  </script>
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center">Image Detection Result</h1>
    <div class="text-center mt-4">
      <img src="{{ result.image_url }}" alt="Uploaded Image" class="img-thumbnail">
    </div>
    <div class="alert alert-info mt-4" role="alert">
      <p>{{ result.disease }}</p>
    </div>
    <div class="text-center mt-3">
      <a href="/" class="btn btn-custom">Upload Again</a>
      <a href="/" class="btn btn-success ml-2" onclick="alert('Result saved.')">Save Result</a>
      <button class="btn btn-info ml-2" onclick="toggleMoreInfo()">More Info</button>
    </div>
    <div id="more-info" class="more-info">
      <div class="card">
        <div class="card-body">
          <div class="text-center mt-4">
            <div class="row">
              <div class="col">
                <h5 class="text-center">{{ result.n_k }}</h5>
                <img src="{{ result.result_url_1 }}" alt="Processed Image" class="img-thumbnail-2" style="cursor: pointer;">
                <p></p>
              </div>
              <div class="col">
                <h5 class="text-center">{{ result.m_n }}</h5>
                <img src="{{ result.result_url_2 }}" alt="Processed Image" class="img-thumbnail-2" style="cursor: pointer;">
                <p></p>
              </div>
              <div class="col">
                <h5 class="text-center">{{ result.m_k }}</h5>
                <img src="{{ result.result_url_3 }}" alt="Processed Image" class="img-thumbnail-2" style="cursor: pointer;">
                <p></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
